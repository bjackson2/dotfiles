# Need to install Nerd Font for theme, then add to iTerm
# brew tap homebrew/cask-fonts && brew install --cask font-droid-sans-mono-nerd-font

set -g history-limit 1000
set -g default-terminal 'xterm-256color'

set -g mouse on
set -g status-left-length 50
# status-right is composed from catppuccin modules further down (new catppuccin API)

# Pane borders - heavy lines with catppuccin colors
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'

setw -g mode-keys vi

# Toggle zoom + copy-mode + mouse together with prefix + y
bind y run-shell 'tmux if -F "#{window_zoomed_flag}" \
  "resize-pane -Z; send-keys q; set -g mouse on" \
  "set -g mouse off; resize-pane -Z; copy-mode"'

# Display the current folder as the window name
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Resizing panes
bind-key -r < resize-pane -L 10
bind-key -r > resize-pane -R 10
bind-key -r - resize-pane -D 5
bind-key -r = resize-pane -U 5

# Swapping panes
bind-key -n C-, swap-pane -D
bind-key -n C-. swap-pane -U

# Splitting panes
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'

# Source the config
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavour 'mocha' # or frappe, macchiato, mocha
# v2 API: tab shape comes from this one option (basic, rounded, slanted, custom, none).
# The old v1 @catppuccin_window_left/right_separator options are ignored by this build.
# NB: catppuccin initializes @catppuccin_window_current_*_separator with `set -o`
# (only-if-unset), so changing the style needs a server restart — or unset those
# three options before re-sourcing — for the CURRENT-window tab to pick it up.
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"

# Render the folder name directly from each pane's path at draw time. Using #W
# (the window name) instead would depend on automatic-rename having fired, and
# falls back to the pane title (the hostname, e.g. "Mac.localdomain") on windows
# that haven't been re-evaluated yet — e.g. the instant you switch to one.
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#{b:pane_current_path}"
# This catppuccin build drives the INACTIVE window label from @catppuccin_window_text
# (not @catppuccin_window_default_text). Its default is " #T", and #T is the pane
# title, which defaults to the hostname ("Mac.localdomain") — that's the stray name.
# #{@claude_state} is a per-window option set by Claude Code hooks via
# claude/tmux-claude-status.sh: ✳ working, ● needs input, ✔ done. Empty when no
# Claude session, so it renders as nothing on normal tabs.
set -g @catppuccin_window_text " #{b:pane_current_path}#{@claude_state}"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text " #{b:pane_current_path}#{@claude_state}"

set -g @catppuccin_date_time_text " %a, %b %d - %I:%M"
# The current catppuccin (rewrite) ignores @catppuccin_status_modules_right; status-right
# must be composed manually from #{E:@catppuccin_status_<module>} options (resolved at render).
set -g status-right "#{E:@catppuccin_status_date_time}"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "yes"
set -g @catppuccin_status_fill "all"
set -g @catppuccin_status_connect_separator "no"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Initialize TMUX plugin manager
run -b '~/.tmux/plugins/tpm/tpm'
